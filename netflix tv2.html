<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NETFLIX TV - Team Starblack</title>
    
    <!-- HLS.js para reproducción de streams -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Netflix Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #141414;
            color: #fff;
            overflow-x: hidden;
        }

        /* LOGIN SCREEN */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%), 
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/7ea4545e-42d3-4ebf-82fd-0e1984dc6375/web/DO-es-20260316-TRIFECTA-perspective_5f63a8b1-be18-4c03-9cbe-fc57f9a2d3d5_small.jpg');
            background-size: cover;
            background-position: center;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: rgba(0,0,0,0.75);
            border-radius: 8px;
            padding: 60px 68px 40px;
            width: 100%;
            max-width: 450px;
        }

        .login-box h1 {
            color: #e50914;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 28px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            background: #333;
            border: none;
            border-radius: 4px;
            padding: 16px 20px;
            margin-bottom: 16px;
            color: #fff;
            font-size: 16px;
        }

        .login-box input:focus {
            outline: none;
            background: #454545;
        }

        .login-btn {
            background: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 24px;
        }

        .login-btn:hover {
            background: #f40612;
        }

        .login-error {
            color: #e50914;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }

        .login-footer {
            margin-top: 32px;
            color: #737373;
            font-size: 13px;
            text-align: center;
        }

        /* MAIN APP */
        .app {
            display: none;
            min-height: 100vh;
            background: #141414;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 100%);
            padding: 20px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .navbar-scrolled {
            background: #141414;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo {
            color: #e50914;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background: rgba(0,0,0,0.7);
            border: 1px solid #aaa;
            border-radius: 4px;
            padding: 8px 12px 8px 32px;
            color: white;
            font-size: 14px;
            width: 200px;
        }

        .search-box input:focus {
            width: 280px;
            outline: none;
            border-color: #fff;
        }

        .search-box i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: #e50914;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }

        /* MAIN CONTENT */
        .main-content {
            padding-top: 80px;
            min-height: 100vh;
        }

        /* HERO SECTION */
        .hero-section {
            margin-bottom: 40px;
            position: relative;
            height: 70vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 0 4% 80px;
        }

        .hero-info {
            max-width: 500px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-description {
            font-size: 18px;
            margin-bottom: 24px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .hero-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-play, .btn-info {
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-play {
            background: white;
            color: black;
        }

        .btn-info {
            background: rgba(109,109,110,0.7);
            color: white;
        }

        /* ROWS */
        .rows-container {
            padding: 0 4%;
        }

        .row {
            margin-bottom: 40px;
        }

        .row-header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .row-items {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
        }

        .row-items::-webkit-scrollbar {
            height: 8px;
        }

        .row-items::-webkit-scrollbar-track {
            background: #2d2d2d;
            border-radius: 4px;
        }

        .row-items::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 4px;
        }

        /* CHANNEL CARD */
        .channel-card {
            flex: 0 0 200px;
            cursor: pointer;
            transition: transform 0.3s;
            border-radius: 4px;
            overflow: hidden;
        }

        .channel-card:hover {
            transform: scale(1.05);
        }

        .card-image {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #2d2d2d;
            overflow: hidden;
            border-radius: 4px;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-badge {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 11px;
        }

        .card-title {
            margin-top: 8px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* PLAYER MODAL */
        .player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .player-modal.active {
            display: flex;
        }

        .player-container {
            flex: 1;
            background: #000;
            position: relative;
        }

        .close-player {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-player:hover {
            background: rgba(0,0,0,0.9);
        }

        .player-info {
            padding: 20px 4%;
            background: #141414;
        }

        .player-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .player-meta {
            display: flex;
            gap: 20px;
            color: #aaa;
            font-size: 14px;
        }

        #video-player {
            width: 100%;
            height: 100%;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #e50914;
        }

        .no-results {
            text-align: center;
            padding: 60px;
            color: #737373;
        }

        .search-suggestions {
            position: absolute;
            top: 100%;
            right: 0;
            background: #141414;
            border: 1px solid #333;
            border-radius: 4px;
            min-width: 280px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 200;
            display: none;
        }

        .search-suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .suggestion-item:hover {
            background: #2d2d2d;
        }

        .suggestion-thumb {
            width: 60px;
            height: 34px;
            object-fit: cover;
            background: #2d2d2d;
        }

        @media (max-width: 768px) {
            .login-box { padding: 40px 24px; }
            .nav-links { display: none; }
            .channel-card { flex: 0 0 140px; }
            .hero-title { font-size: 28px; }
            .hero-section { height: 50vh; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-container">
    <div class="login-box">
        <h1>NETFLIX TV</h1>
        <input type="text" id="login-user" placeholder="Usuario">
        <input type="password" id="login-pass" placeholder="Contraseña" onkeypress="if(event.key==='Enter') handleLogin()">
        <button class="login-btn" onclick="handleLogin()">Iniciar Sesión</button>
        <div id="login-error-msg" class="login-error"></div>
        <div class="login-footer">
            <p>By @hacker056</p>
            <p>© 2026 NETFLIX TV</p>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="app">
    <div class="navbar" id="navbar">
        <div class="nav-left">
            <div class="logo" onclick="resetToHome()">NETFLIX TV</div>
            <div class="nav-links" id="nav-links"></div>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Buscar canales..." onkeyup="handleSearch()">
                <div id="search-suggestions" class="search-suggestions"></div>
            </div>
            <div class="user-avatar" id="user-avatar">U</div>
        </div>
    </div>

    <div class="main-content">
        <div id="hero-section" class="hero-section">
            <div class="hero-info">
                <div class="hero-title" id="hero-title">Bienvenido</div>
                <div class="hero-description" id="hero-desc">Selecciona un canal para comenzar</div>
                <div class="hero-buttons">
                    <button class="btn-play" id="hero-play-btn"><i class="fas fa-play"></i> Ver ahora</button>
                </div>
            </div>
        </div>
        <div class="rows-container" id="rows-container"></div>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-modal" class="player-modal">
        <div class="player-container">
            <button class="close-player" onclick="closePlayer()"><i class="fas fa-times"></i></button>
            <video id="video-player" controls autoplay></video>
        </div>
        <div class="player-info">
            <div class="player-title" id="player-title">Canal</div>
            <div class="player-meta">
                <span><i class="fas fa-eye"></i> EN VIVO</span>
                <span><i class="fas fa-signal"></i> HD</span>
            </div>
        </div>
    </div>
</div>

<script>
// ========== USUARIOS ==========
const USERS = {
    'hacker056': '@hacker056',
    'demo': 'demo'
};

let currentUser = null;
let allChannels = [];
let categoriesSet = new Set();
let currentCategory = 'TODOS';
let currentSearchQuery = '';
let currentHls = null;
let currentVideo = null;

// URL del M3U
const M3U_URL = 'https://raw.githubusercontent.com/hacker056x/iptv/refs/heads/main/m3u.txt';

// ========== FUNCIONES PARA CARGAR Y PARSEAR M3U ==========
async function loadChannelsFromURL() {
    try {
        const response = await fetch(M3U_URL);
        if (!response.ok) throw new Error('Error al cargar la lista de canales');
        const m3uText = await response.text();
        
        const lines = m3uText.split('\n');
        const channels = [];
        let currentChannel = null;
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF')) {
                // Extraer información del canal
                const match = line.match(/tvg-logo="([^"]*)"/);
                const logo = match ? match[1] : null;
                
                const groupMatch = line.match(/group-title="([^"]*)"/);
                let category = groupMatch ? groupMatch[1] : 'General';
                
                // Limpiar nombre de categoría
                if (category.includes('Provider') || category === 'Provider') category = 'Latino';
                if (category.includes('Latino')) category = 'Latino';
                if (category.includes('MX')) category = 'México';
                if (category.includes('USA')) category = 'USA';
                if (category.includes('ES')) category = 'España';
                if (category.includes('PR')) category = 'Puerto Rico';
                if (category.includes('RD')) category = 'República Dominicana';
                if (category.includes('AR')) category = 'Argentina';
                if (category.includes('CO')) category = 'Colombia';
                if (category.includes('CA')) category = 'Canadá';
                if (category.includes('UK')) category = 'UK';
                if (category.includes('XXX')) category = 'Adultos';
                if (category.includes('NFL')) category = 'Deportes';
                if (category.includes('NBA')) category = 'Deportes';
                if (category.includes('NHL')) category = 'Deportes';
                
                // Extraer título después del último coma
                const lastComma = line.lastIndexOf(',');
                let title = '';
                if (lastComma !== -1) {
                    title = line.substring(lastComma + 1).trim();
                } else {
                    title = 'Canal';
                }
                
                // Limpiar título
                title = title.replace(/HD$/, '').trim();
                if (!title) title = 'Canal';
                
                currentChannel = {
                    title: title,
                    category: category,
                    logo: logo && logo !== 'http://127.0.0.1/' ? logo : null,
                    url: null
                };
            } else if (line.startsWith('http') && currentChannel) {
                currentChannel.url = line.split(' ')[0]; // Tomar solo la URL
                if (currentChannel.url && currentChannel.url.startsWith('http')) {
                    // Asignar logo por defecto si no tiene
                    if (!currentChannel.logo) {
                        currentChannel.logo = `https://ui-avatars.com/api/?background=e50914&color=fff&bold=true&size=180&fontsize=80&name=${encodeURIComponent(currentChannel.title.substring(0,2))}`;
                    }
                    channels.push({ ...currentChannel, id: channels.length });
                }
                currentChannel = null;
            }
        }
        
        // Filtrar canales duplicados por URL
        const uniqueChannels = [];
        const urlSet = new Set();
        for (const ch of channels) {
            if (ch.url && !urlSet.has(ch.url)) {
                urlSet.add(ch.url);
                uniqueChannels.push(ch);
            }
        }
        
        console.log(`Canales cargados: ${uniqueChannels.length}`);
        return uniqueChannels;
        
    } catch (error) {
        console.error('Error cargando M3U:', error);
        return [];
    }
}

// ========== LOGIN ==========
async function handleLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value;
    const errorDiv = document.getElementById('login-error-msg');
    
    if (!username || !password) {
        errorDiv.textContent = 'Ingresa usuario y contraseña';
        return;
    }
    
    if (USERS[username] && USERS[username] === password) {
        currentUser = username;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('user-avatar').textContent = username.charAt(0).toUpperCase();
        
        // Mostrar loading
        document.getElementById('rows-container').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Cargando canales...</div>';
        
        // Cargar canales desde URL
        const loadedChannels = await loadChannelsFromURL();
        if (loadedChannels.length === 0) {
            document.getElementById('rows-container').innerHTML = '<div class="no-results"><i class="fas fa-tv"></i><p>No se pudieron cargar los canales. Verifica la conexión.</p></div>';
            return;
        }
        
        allChannels = loadedChannels;
        initApp();
    } else {
        errorDiv.textContent = 'Usuario o contraseña incorrectos';
    }
}

// ========== INICIALIZAR ==========
function initApp() {
    categoriesSet.clear();
    categoriesSet.add('TODOS');
    allChannels.forEach(ch => {
        let cat = ch.category;
        if (!cat) cat = 'General';
        categoriesSet.add(cat);
    });
    
    renderCategories();
    renderRows();
    updateHero();
}

function renderCategories() {
    const navLinks = document.getElementById('nav-links');
    const categories = ['TODOS', ...Array.from(categoriesSet).filter(c => c !== 'TODOS')];
    
    navLinks.innerHTML = categories.map(cat => `
        <a onclick="filterCategory('${cat.replace(/'/g, "\\'")}')" class="${cat === 'TODOS' ? 'active' : ''}">
            ${cat}
        </a>
    `).join('');
}

function filterCategory(category) {
    currentCategory = category;
    currentSearchQuery = '';
    document.getElementById('search-input').value = '';
    
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    event.target.classList.add('active');
    
    renderRows();
    updateHero();
    closeSuggestions();
}

function renderRows() {
    let filtered = [...allChannels];
    if (currentCategory !== 'TODOS') {
        filtered = filtered.filter(ch => ch.category === currentCategory);
    }
    if (currentSearchQuery) {
        filtered = filtered.filter(ch => ch.title.toLowerCase().includes(currentSearchQuery.toLowerCase()));
    }
    
    const container = document.getElementById('rows-container');
    if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results"><i class="fas fa-tv"></i><p>No se encontraron canales</p></div>';
        return;
    }
    
    const channelsByCat = {};
    filtered.forEach(ch => {
        const cat = ch.category || 'General';
        if (!channelsByCat[cat]) channelsByCat[cat] = [];
        channelsByCat[cat].push(ch);
    });
    
    let html = '';
    for (const [cat, channels] of Object.entries(channelsByCat)) {
        html += `
            <div class="row">
                <div class="row-header"><h2>${cat}</h2></div>
                <div class="row-items">
        `;
        channels.forEach(channel => {
            html += `
                <div class="channel-card" onclick="playChannel(${channel.id})">
                    <div class="card-image">
                        <img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/320x180/e50914/ffffff?text=TV'">
                        <div class="card-badge">EN VIVO</div>
                    </div>
                    <div class="card-title">${escapeHtml(channel.title)}</div>
                </div>
            `;
        });
        html += `</div></div>`;
    }
    container.innerHTML = html;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function updateHero() {
    let filtered = [...allChannels];
    if (currentCategory !== 'TODOS') {
        filtered = filtered.filter(ch => ch.category === currentCategory);
    }
    if (filtered.length > 0) {
        const random = filtered[Math.floor(Math.random() * filtered.length)];
        document.getElementById('hero-title').textContent = random.title;
        document.getElementById('hero-desc').textContent = `Ver ${random.title} en vivo`;
        document.getElementById('hero-play-btn').onclick = () => playChannel(random.id);
        document.getElementById('hero-section').style.backgroundImage = `linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 100%), url(${random.logo})`;
    }
}

function resetToHome() {
    currentCategory = 'TODOS';
    currentSearchQuery = '';
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    if (document.querySelector('.nav-links a')) document.querySelector('.nav-links a').classList.add('active');
    renderRows();
    updateHero();
}

// ========== REPRODUCTOR FUNCIONAL ==========
function playChannel(channelId) {
    const channel = allChannels.find(c => c.id === channelId);
    if (!channel || !channel.url) {
        alert('Canal no disponible');
        return;
    }
    
    console.log('Reproduciendo:', channel.title);
    console.log('URL:', channel.url);
    
    // Cerrar HLS anterior si existe
    if (currentHls) {
        currentHls.destroy();
        currentHls = null;
    }
    
    const modal = document.getElementById('player-modal');
    const video = document.getElementById('video-player');
    const playerTitle = document.getElementById('player-title');
    
    playerTitle.textContent = channel.title;
    
    // Detener video actual
    video.pause();
    video.removeAttribute('src');
    video.load();
    
    // Usar HLS.js para reproducción
    if (Hls.isSupported()) {
        currentHls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 90
        });
        currentHls.loadSource(channel.url);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play().catch(e => console.log('Error al reproducir:', e));
        });
        currentHls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
                console.error('Error fatal HLS:', data);
                alert(`Error al reproducir "${channel.title}". El stream puede no estar disponible.`);
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari nativo
        video.src = channel.url;
        video.addEventListener('loadedmetadata', function() {
            video.play().catch(e => console.log('Error:', e));
        });
    } else {
        alert('Tu navegador no soporta reproducción HLS');
        return;
    }
    
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closePlayer() {
    const modal = document.getElementById('player-modal');
    const video = document.getElementById('video-player');
    
    // Detener y limpiar HLS
    if (currentHls) {
        currentHls.destroy();
        currentHls = null;
    }
    
    video.pause();
    video.removeAttribute('src');
    video.load();
    
    modal.classList.remove('active');
    document.body.style.overflow = '';
}

// ========== BÚSQUEDA ==========
function handleSearch() {
    const query = document.getElementById('search-input').value.trim();
    currentSearchQuery = query;
    
    if (query.length < 2) {
        closeSuggestions();
        renderRows();
        updateHero();
        return;
    }
    
    const results = allChannels.filter(ch => ch.title.toLowerCase().includes(query.toLowerCase()));
    showSuggestions(results.slice(0, 5));
    renderRows();
    updateHero();
}

function showSuggestions(results) {
    const suggestionsDiv = document.getElementById('search-suggestions');
    suggestionsDiv.innerHTML = '';
    
    if (results.length === 0) {
        suggestionsDiv.innerHTML = '<div class="suggestion-item">No se encontraron canales</div>';
        suggestionsDiv.classList.add('active');
        return;
    }
    
    results.forEach(result => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `
            <img class="suggestion-thumb" src="${result.logo}" onerror="this.src='https://via.placeholder.com/60x34/e50914/ffffff?text=TV'">
            <div class="suggestion-info">
                <div class="suggestion-title">${escapeHtml(result.title)}</div>
                <div class="suggestion-category">${result.category}</div>
            </div>
        `;
        item.onclick = () => {
            document.getElementById('search-input').value = result.title;
            closeSuggestions();
            playChannel(result.id);
        };
        suggestionsDiv.appendChild(item);
    });
    
    suggestionsDiv.classList.add('active');
}

function closeSuggestions() {
    document.getElementById('search-suggestions').classList.remove('active');
}

document.addEventListener('click', function(e) {
    if (!document.querySelector('.search-box')?.contains(e.target)) {
        closeSuggestions();
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePlayer();
});
</script>
